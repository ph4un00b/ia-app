name: lola_ai_app
description: "A new Flutter project."

publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 1.0.0+19

environment:
  sdk: ">=3.5.0 <=3.27.4"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: 1.0.8
  basic_utils: 5.8.2 # blocker by flutter_flavorizr 2.3.0
  google_fonts: 6.2.1
  record: 5.2.1
  path_provider: 2.1.5
  path: 1.9.0 # blocked by integration_test from the current flutter SDK.
  just_audio: 0.9.46
  dart_openai: 5.1.0
  dio: 5.8.0+1
  json_annotation: 4.9.0
  shared_preferences: 2.5.2
  openai_dart: 0.4.5
  supabase_flutter: 2.8.4
  timeago: 3.7.0
  test: 1.25.7 # in order to use it with dart 3.5.4
  http: 1.3.0
  sentry_flutter: 8.9.0 # blocked by podfile issue whe updated
  sentry_dio: 8.9.0 # blocked by podfile issue whe updated
  mixpanel_flutter: 2.3.4
  supabase_auth_ui: 0.5.4
  force_update_helper: 0.2.1
  url_launcher: 6.3.1
  flex_color_scheme: 8.0.2 # in order to use it with dart 3.5.4
  envied: 1.1.1
  flutter_spinkit: 5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: 5.0.0
  build_runner: 2.4.13
  json_serializable: 6.9.0 # in order to use it with dart 3.5.4
  integration_test:
    sdk: flutter
  flutter_launcher_icons: 0.14.3
  flutter_native_splash: 2.4.1 # blocked by using path 1.9.0
  flutter_flavorizr: 2.3.0
  sentry_dart_plugin: 2.4.1
  envied_generator: 1.1.1

flutter:
  uses-material-design: true
  assets:
    - assets/common/
    - assets/dev/
    - assets/prod/
    # - .env.dev
    # - .env.prod

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/assets-and-images/#resolution-aware

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/assets-and-images/#from-packages

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/custom-fonts/#from-packages

flutter_launcher_icons:
  ios: true
  # web: false
  android: false
  image_path_ios: "assets/common/app-icon.png"
  image_path_ios_dark_transparent: "assets/common/app-icon-transparent.png"
  # image_path_android: "assets/android/app-icon-android.png"
  # adaptive_icon_background: "assets/android/app-icon-background.png"
  # adaptive_icon_foreground: "assets/android/app-icon-foreground.png"
  remove_alpha_ios: true #  icons with an alpha channel are not allowed in the Apple App Store.

flutter_native_splash:
  color: "#ffffff"
  color_android: "#ffffff"
  # color_dark_android: "#121212"
  color_ios: "#ffffff"
  color_dark_ios: "#121212"
  # color_web: "#ffffff"
  # color_dark_web: "#121212"
  image: "assets/common/app-icon-transparent.png"
  web: false
  android: false

flavorizr:
  ide: "vscode"
  # app:
  #   android:
  #     flavorDimensions: "flavor-type"

  # TODO: setup the production bundle id
  flavors:
    dev:
      app:
        name: "Lola AI App Dev"
      # android:
      #   applicationId: "com.example.lola_ai_app.dev"
      #   icon: "assets/dev/app-icon.png"
      #   adaptiveIcon:
      #     foreground: "assets/dev/app-icon-foreground.png"
      #     background: "assets/android/app-icon-background.png"
      ios:
        bundleId: "com.example.lolaAiApp.dev"
        icon: "assets/dev/app-icon.png"

    prod:
      app:
        name: "Lola AI App"
      # android:
      #   applicationId: "com.example.lola_ai_app"
      #   icon: "assets/prod/app-icon.png"
      #   adaptiveIcon:
      #     foreground: "assets/prod/app-icon-foreground.png"
      #     background: "assets/android/app-icon-background.png"
      ios:
        bundleId: "com.lolaai.app"
        icon: "assets/prod/app-icon.png"

# @see https://docs.sentry.io/platforms/flutter/upload-debug/#available-configuration-fields
sentry:
  upload_debug_symbols: true
  upload_source_maps: true
  upload_sources: true
  project: lola-app # TODO: Update this
  org: jamon # TODO: Update this
  wait_for_processing: true
  log_level: error # possible values: trace, debug, info, warn, error
  commits: auto
  ignore_missing: true
